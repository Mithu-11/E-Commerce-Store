<!DOCTYPE html>
<html>
<head>
<title>E-Commerce Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>E-Commerce Store</h2>

<div class="products">

<div class="product">
<img src="tshirt.jpg">
<h3>T-Shirt</h3>
<p>₹500</p>
<button onclick="addProduct('T-Shirt','image/tshirt.jpg',500)">Add to Cart</button>
</div>

<div class="product">
<img src="shoes.jpg">
<h3>Shoes</h3>
<p>₹1500</p>
<button onclick="addProduct('Shoes','image/shoes.jpg',1500)">Add to Cart</button>
</div>

<div class="product">
<img src="watch.jpg">
<h3>Watch</h3>
<p>₹800</p>
<button onclick="addProduct('watch','image/watch.jpg',800)">Add to Cart</button>
</div>

<div class="product">
<img src="kurti.jpg">
<h3>Kurti</h3>
<p>₹900</p>
<button onclick="addProduct('Kurti','image/kurti.jpg',900)">Add to Cart</button>
</div>

<div class="product">
<img src="kurtaset.jpg">
<h3>Kurta Set</h3>
<p>₹1200</p>
<button onclick="addProduct('Kurta Set','image/kurtaset.jpg',1200)">Add to Cart</button>
</div>

<div class="product">
<img src="nightsuit.jpg">
<h3>Night Suit</h3>
<p>₹700</p>
<button onclick="addProduct('Night Suit','image/nightsuit.jpg',700)">Add to Cart</button>
</div>

</div>

<h2>Cart</h2>

<div id="cart"></div>

<h3>Total: ₹<span id="total">0</span></h3>

<button class="order-btn" onclick="placeOrder()">Place Order</button>

<script src="script.js"></script>

</body>

</html>
